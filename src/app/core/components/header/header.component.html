<section #headerSection class="header-section d-flex align-items-center justify-content-between flex-wrap-reverse">
  <!--start bg icons-->
  <div class="header-icons">
    <img #headerIcon1 class="bg-icon header-icon1" src="assets/images/pages/icons/chocolate.png" alt="Jahez App" />
    <img #headerIcon2 class="bg-icon header-icon2" src="assets/images/pages/icons/coffee.png" alt="Jahez App" />
    <img #headerIcon3 class="bg-icon header-icon3" src="assets/images/pages/icons/food.png" alt="Jahez App" />
  </div>
  <!--end bg icons-->
  <div class="header-text mt-4" #headerText>
    <h1 class="fs-32" #headerTitle>{{'HEADER.TITLE' | translate}}</h1>
    <p class="fs-20">{{'HEADER.SUBTITLE' | translate}}</p>
  </div>
  <div class="header-image" #headerImage>
    <img class="bg-image" src="assets/images/pages/images/mobile-bg.png" alt="Jahez App" />
    <div class="page">
      <img #page1 class="page-1" src="assets/images/pages/images/mobile-page-header1.png" alt="Jahez App" />
      <img #page2 class="page-2" src="assets/images/pages/images/mobile-page-header2.png" alt="Jahez App" />
    </div>
  </div>
</section>
